services:
  fastapi_app:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db
      - qdrant

  # application_db:
  #   image: postgres:17
  #   environment:
  #     POSTGRES_USER: postgres
  #     POSTGRES_PASSWORD: admin
  #     POSTGRES_DB: application_db
  #   ports:
  #     - "5433:5433"

  db:
    image: postgres:17
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
    ports:
      - "5433:5433"

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
